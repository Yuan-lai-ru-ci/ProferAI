# Proma Team Server — Docker Compose
# 启动:  docker compose up -d
# 查看:  docker compose logs -f
# 重启:  docker compose restart
# 停止:  docker compose down

services:
  proma-team:
    build: .
    container_name: proma-team
    restart: unless-stopped
    ports:
      - "3456:3456"
    volumes:
      # 持久化数据：数据库 + 上传文件
      - promadata:/app/data
      # NewAPI 数据库共享（PER_USER_NEWAPI_KEY 模式下需要直接读写 NewAPI SQLite）
      - ${NEWAPI_DATA_DIR:-/home/ecs-user/new-api-data}:/app/new-api-data
    environment:
      # === 必填 ===
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # === 可选 ===
      - PORT=3456
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@proma.local}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-524288000}
      - COMMERCIAL_MODE=${COMMERCIAL_MODE:-false}
      - CHANNEL_ENCRYPTION_KEY=${CHANNEL_ENCRYPTION_KEY:-}
      - RELAY_BASE_URL=${RELAY_BASE_URL:-http://127.0.0.1:3080}
      - RELAY_API_KEY=${RELAY_API_KEY:-}
      - NEWAPI_ADMIN_TOKEN=${NEWAPI_ADMIN_TOKEN:-}
      - NEWAPI_ADMIN_USER_ID=${NEWAPI_ADMIN_USER_ID:-2}
      - DEFAULT_CREDIT_GRANT=${DEFAULT_CREDIT_GRANT:-1000}
      # === MinerU 论文解析 ===
      - MINERU_API_KEY=${MINERU_API_KEY:-}
      # === 飞书意见箱 ===
      - LARK_APP_ID=${LARK_APP_ID:-}
      - LARK_APP_SECRET=${LARK_APP_SECRET:-}
      - LARK_FEEDBACK_BASE_TOKEN=${LARK_FEEDBACK_BASE_TOKEN:-SZ59bPc7Sabn0usFytdcR5xTnIb}
      - LARK_FEEDBACK_TABLE_ID=${LARK_FEEDBACK_TABLE_ID:-tbltUYCTDxdcWMBT}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3456/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  promadata:
    driver: local
