<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Profer Admin</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--border:#e2e8f0;--text:#172033;--muted:#64748b;--primary:#4f46e5;--primary-hover:#4338ca;--danger:#dc2626;--danger-hover:#b91c1c;--success:#059669;--warn:#d97706;--info:#2563eb;--sidebar:#111936;--sidebar-2:#192451;--shadow:0 1px 2px rgba(15,23,42,.04),0 8px 24px rgba(15,23,42,.045)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;font-size:14px}.app{display:flex;min-height:100vh}.sidebar{width:248px;flex:none;background:linear-gradient(160deg,var(--sidebar),var(--sidebar-2));color:#c7d2fe;display:flex;flex-direction:column;box-shadow:4px 0 18px rgba(15,23,42,.06)}
.sidebar-brand{padding:26px 22px 20px;border-bottom:1px solid rgba(255,255,255,.09)}.sidebar-brand h2{display:flex;align-items:center;gap:9px;font-size:17px;font-weight:720;color:#fff;letter-spacing:-.35px}.sidebar-brand h2:before{content:'';width:10px;height:10px;border-radius:3px;background:linear-gradient(135deg,#a5b4fc,#6366f1);box-shadow:0 0 0 4px rgba(165,180,252,.12)}.sidebar-brand p{font-size:11px;letter-spacing:.04em;color:#8fa0d8;margin-top:5px}.sidebar-nav{flex:1;padding:18px 12px;display:flex;flex-direction:column;gap:3px}.nav-group{padding:13px 10px 5px;font-size:10px;font-weight:700;letter-spacing:.1em;color:#7080b9;text-transform:uppercase}.sidebar-nav a{position:relative;display:flex;align-items:center;gap:11px;min-height:42px;padding:10px 12px;border-radius:9px;font-size:13.5px;color:#c7d2fe;text-decoration:none;cursor:pointer;transition:.16s;font-weight:520}.sidebar-nav a:hover{background:rgba(255,255,255,.07);color:#fff}.sidebar-nav a.on{background:rgba(129,140,248,.2);color:#fff;font-weight:650}.sidebar-nav a.on:before{content:'';position:absolute;left:-12px;width:3px;height:20px;border-radius:0 3px 3px 0;background:#a5b4fc}.sidebar-nav .nav-icon{width:18px;text-align:center;color:#aebcf3}.sidebar-footer{padding:16px 12px;border-top:1px solid rgba(255,255,255,.09)}.sidebar-footer a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;font-size:13px;color:#8fa0d8;text-decoration:none;cursor:pointer}.sidebar-footer a:hover{background:rgba(248,113,113,.12);color:#fecaca}
.main{flex:1;min-width:0;padding:32px 36px 52px;overflow-y:auto}.main-content{max-width:1440px;margin:auto}.card{background:var(--card);border-radius:14px;padding:22px;box-shadow:var(--shadow);margin-bottom:18px;border:1px solid var(--border)}.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px}.card-header h2{font-size:14px;font-weight:680;color:var(--text)}.stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.stat-card{min-width:0;background:var(--card);border-radius:13px;padding:18px 19px;box-shadow:0 1px 2px rgba(15,23,42,.025);border:1px solid var(--border);transition:.16s}.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(15,23,42,.07)}.stat-card .stat-icon{display:none}.stat-card .stat-val{overflow:hidden;font-size:27px;line-height:1.15;font-weight:735;letter-spacing:-.65px;color:var(--text);text-overflow:ellipsis;white-space:nowrap}.stat-card .stat-lbl{font-size:12.5px;color:var(--muted);margin-top:7px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:34px;padding:7px 13px;border-radius:8px;font:inherit;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:.15s;white-space:nowrap}.btn:hover{transform:translateY(-1px)}.btn-primary{background:var(--primary);color:#fff;box-shadow:0 1px 2px rgba(79,70,229,.28)}.btn-primary:hover{background:var(--primary-hover)}.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:var(--danger-hover)}.btn-outline{background:var(--card);color:#334155;border-color:#cbd5e1}.btn-outline:hover{background:#f8fafc;border-color:#94a3b8}.btn-sm{min-height:30px;padding:5px 9px;font-size:12px}.btn-ghost{min-height:30px;padding:5px 8px;font-size:12px;background:transparent;color:var(--info);border:none}.btn-ghost:hover{background:#eff6ff}input,select,textarea{width:100%;min-height:38px;padding:8px 11px;border:1px solid #cbd5e1;border-radius:8px;font:inherit;font-size:13px;outline:none;background:var(--card);color:var(--text);transition:.15s}textarea{resize:vertical}input:focus,select:focus,textarea:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(99,102,241,.14)}button:focus-visible,a:focus-visible{outline:3px solid rgba(99,102,241,.35);outline-offset:2px}label{display:block;font-size:12.5px;font-weight:630;margin-bottom:6px;color:#334155}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:15px}.form-row-3{grid-template-columns:1fr 1fr 1fr}table{width:100%;border-collapse:separate;border-spacing:0}td,th{text-align:left;padding:12px 13px;border-bottom:1px solid #edf1f6;font-size:12.5px;vertical-align:middle}th{color:var(--muted);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.065em;background:#f8fafc}tbody tr:last-child td{border-bottom:0}tr:hover td{background:#fafcff}.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:650}.badge-success{background:#ecfdf5;color:#047857}.badge-danger{background:#fef2f2;color:#b91c1c}.badge-warn{background:#fffbeb;color:#a16207}.badge-info{background:#eff6ff;color:#1d4ed8}.toast{position:fixed;top:20px;right:22px;padding:12px 15px;border-radius:10px;color:#fff;font-size:13px;z-index:9999;box-shadow:0 12px 28px rgba(15,23,42,.2);animation:in .22s ease-out;font-weight:560}@keyframes in{from{transform:translateY(-8px);opacity:0}to{transform:translateY(0);opacity:1}}.empty-state{text-align:center;padding:46px 24px;color:var(--muted)}.empty-state .empty-icon{font-size:28px;margin-bottom:10px;opacity:.7}.page-title{font-size:24px;font-weight:730;margin-bottom:24px;color:var(--text);letter-spacing:-.6px}.page-title:after{content:'运营控制台';display:block;margin-top:7px;font-size:12.5px;font-weight:450;letter-spacing:0;color:var(--muted)}.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--sidebar)}.login-card{background:#fff;border-radius:16px;padding:36px;width:400px;box-shadow:0 24px 60px rgba(15,23,42,.24)}.login-card h1{font-size:22px;font-weight:730;margin-bottom:6px;letter-spacing:-.45px}.login-card .login-sub{font-size:13px;color:var(--muted);margin-bottom:27px}.login-err{background:#fef2f2;color:#b91c1c;padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}@media(max-width:1100px){.main{padding:26px}.stat-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:720px){.app{flex-direction:column}.sidebar{width:100%}.sidebar-brand{padding:17px 18px}.sidebar-nav{padding:8px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:2px}.nav-group{display:none}.sidebar-nav a{min-height:38px;padding:8px}.sidebar-nav a.on:before{display:none}.sidebar-footer{display:none}.main{padding:22px 15px 36px}.stat-grid,.form-row,.form-row-3{grid-template-columns:1fr}.card{padding:16px}.card-header{flex-direction:column}.login-card{width:calc(100% - 32px);padding:28px}}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
var TOKEN=sessionStorage.getItem('at')||'';
var PREFIX=(function(){var p=location.pathname;return p.substring(0,p.indexOf('/admin'))})();
var API=PREFIX+'/v1';

function toast(m,ok){var t=document.createElement('div');t.className='toast';t.setAttribute('role','status');t.style.background=ok===false?'#b91c1c':'#047857';t.textContent=(ok===false?'! ':'✓ ')+m;document.body.appendChild(t);setTimeout(function(){t.remove()},2800)}

async function api(path,opts){
  opts=opts||{};opts.headers=opts.headers||{};opts.headers['Content-Type']='application/json';
  if(TOKEN)opts.headers['Authorization']='Bearer '+TOKEN;
  var r=await fetch(API+path,opts);
  if(r.status===401){TOKEN='';sessionStorage.removeItem('at');location.hash='login';throw new Error('unauthorized')}
  var d=await r.json().catch(function(){return{}});
  if(!r.ok)throw new Error(d.error||'请求失败 ('+r.status+')');
  return d;
}

// ---- Router ----
function route(){
  var h=location.hash.slice(1)||(TOKEN?'dashboard':'login');
  if(!TOKEN&&h!=='login'){location.hash='login';return}
  if(TOKEN&&h==='login'){location.hash='dashboard';return}
  var c=document.querySelector('.main-content');if(!c)return;
  c.innerHTML='';
  document.querySelectorAll('.sidebar-nav a').forEach(function(a){a.className=a.getAttribute('href')==='#'+h?'on':''});
  switch(h){
    case'login':renderLogin(c);break;
    case'dashboard':renderDashboard(c);break;
    case'users':renderUsers(c);break;
    case'channels':renderChannels(c);break;
    case'credits':renderCredits(c);break;
    case'orders':renderOrders(c);break;
    case'activation':renderActivation(c);break;case'redemption':renderRedemption(c);break;
    case'pricing':renderPricing(c);break;
  }
}

// ---- Login ----
function renderLogin(c){
  document.querySelector('.sidebar').style.display='none';
  c.parentElement.style.padding='0';
  c.parentElement.style.display='flex';c.parentElement.style.alignItems='center';c.parentElement.style.justifyContent='center';
  c.parentElement.style.background='linear-gradient(135deg,#667eea 0%,#764ba2 100%)';
  var em='',pw='',err='';
  c.innerHTML='<div class="login-card">'+
    '<h1>Profer Admin</h1><div class="login-sub">团队管理后台</div>'+
    '<div class="login-err"></div>'+
    '<div style="margin-bottom:16px"><label>邮箱</label><input class="login-em" type="email" placeholder="admin@example.com"></div>'+
    '<div style="margin-bottom:20px"><label>密码</label><input class="login-pw" type="password" placeholder="输入密码" onkeydown="if(event.key===\'Enter\')this.parentElement.parentElement.querySelector(\'button\').click()"></div>'+
    '<button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:15px">登 录</button></div>';
  var el=c.querySelector('.login-em');el.addEventListener('input',function(e){em=e.target.value});
  var pl=c.querySelector('.login-pw');pl.addEventListener('input',function(e){pw=e.target.value});
  c.querySelector('button').addEventListener('click',function(){
    errEl=c.querySelector('.login-err');
    if(!em||!pw){errEl.textContent='请输入邮箱和密码';errEl.style.display='block';return}
    errEl.style.display='none';
    fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,password:pw})})
    .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d}})})
    .then(function(r){
      if(!r.ok){errEl.textContent=r.d.error||'登录失败';errEl.style.display='block';return}
      if(!r.d.isAdmin){errEl.textContent='此账户不是管理员';errEl.style.display='block';return}
      TOKEN=r.d.accessToken;sessionStorage.setItem('at',TOKEN);
      location.reload();
    })
    .catch(function(e){errEl.textContent='无法连接服务器: '+e.message;errEl.style.display='block'});
  });
}

// ---- Dashboard ----
function renderDashboard(c){
  c.innerHTML='<h1 class="page-title">仪表盘</h1><div class="card"><span class="muted">加载中...</span></div>';
  api('/admin/dashboard/stats').then(function(s){
    var topRows=s.topUsers&&s.topUsers.length?s.topUsers.map(function(u){return'<tr><td><strong>'+esc(u.email||u.id||'-')+'</strong></td><td>'+(u.requests||0).toLocaleString()+'</td><td>'+formatTokens(u.total_tokens||0)+'</td><td style="font-weight:600;color:var(--danger)">'+(u.consumed||0).toLocaleString()+'</td></tr>'}).join(''):'<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">📭</div>近30天暂无调用记录</div></td></tr>';
    c.innerHTML='<h1 class="page-title">仪表盘</h1>'+
      '<div class="stat-grid mb">'+
      '<div class="stat-card"><div class="stat-icon">👥</div><div class="stat-val">'+s.totalUsers+'</div><div class="stat-lbl">总用户</div></div>'+
      '<div class="stat-card"><div class="stat-icon">🟢</div><div class="stat-val">'+s.activeToday+'</div><div class="stat-lbl">今日活跃</div></div>'+
      '<div class="stat-card"><div class="stat-icon">🔌</div><div class="stat-val">'+s.activeChannels+'</div><div class="stat-lbl">活跃渠道</div></div>'+
      '<div class="stat-card"><div class="stat-icon">📁</div><div class="stat-val">'+s.totalWorkspaces+'</div><div class="stat-lbl">总工作区</div></div></div>'+
      '<div class="card"><div class="card-header"><h2>近30天 API 用量</h2></div>'+
      '<div class="stat-grid"><div class="stat-card"><div class="stat-icon">🚀</div><div class="stat-val">'+(s.usageRequests||0).toLocaleString()+'</div><div class="stat-lbl">调用次数</div></div>'+
      '<div class="stat-card"><div class="stat-icon">✅</div><div class="stat-val">'+(s.usageSuccessfulRequests||0).toLocaleString()+'</div><div class="stat-lbl">成功调用</div></div>'+
      '<div class="stat-card"><div class="stat-icon">🌊</div><div class="stat-val">'+(s.usageStreamingRequests||0).toLocaleString()+'</div><div class="stat-lbl">流式请求</div></div>'+
      '<div class="stat-card"><div class="stat-icon">🧮</div><div class="stat-val">'+(s.usageTotalCost||0).toLocaleString()+'</div><div class="stat-lbl">实际计费</div></div></div>'+
      '<div class="stat-grid" style="margin-top:16px"><div class="stat-card"><div class="stat-icon">🧾</div><div class="stat-val">'+formatTokens(s.usageTotalTokens||0)+'</div><div class="stat-lbl">总 Token</div></div>'+
      '<div class="stat-card"><div class="stat-icon">⬇️</div><div class="stat-val">'+formatTokens(s.usagePromptTokens||0)+'</div><div class="stat-lbl">输入 Token</div></div>'+
      '<div class="stat-card"><div class="stat-icon">⬆️</div><div class="stat-val">'+formatTokens(s.usageCompletionTokens||0)+'</div><div class="stat-lbl">输出 Token</div></div>'+
      '<div class="stat-card"><div class="stat-icon">⚠️</div><div class="stat-val">'+(s.usageFailedRequests||0).toLocaleString()+'</div><div class="stat-lbl">失败调用</div></div></div></div>'+
      '<div class="card"><div class="card-header"><h2>额度概览</h2></div>'+
      '<div class="stat-grid"><div class="stat-card"><div class="stat-icon">💰</div><div class="stat-val">'+Math.round((s.totalBalance||0)/50000).toLocaleString()+'</div><div class="stat-lbl">总余额（积分）</div></div>'+
      '<div class="stat-card"><div class="stat-icon">📊</div><div class="stat-val">'+Math.round((s.totalConsumed||0)/50000).toLocaleString()+'</div><div class="stat-lbl">累计消耗（积分）</div></div>'+
      '<div class="stat-card"><div class="stat-icon">📅</div><div class="stat-val">'+Math.round((s.consumedThisMonth||0)/50000).toLocaleString()+'</div><div class="stat-lbl">本月消耗（积分）</div></div>'+
      '<div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-val">'+(s.topUsers&&s.topUsers[0]?esc(s.topUsers[0].email||s.topUsers[0].id):'-')+'</div><div class="stat-lbl">最高用量用户</div></div></div></div>'+
      '<div class="card" style="overflow:auto"><div class="card-header"><h2>近30天用量用户</h2><a class="btn btn-outline btn-sm" href="#credits">查看用量明细</a></div><table><thead><tr><th>用户</th><th>请求数</th><th>Token</th><th>费用</th></tr></thead><tbody>'+topRows+'</tbody></table></div>';
  }).catch(function(e){c.innerHTML='<h1 class="page-title">仪表盘</h1><div class="card"><div class="empty-state"><div class="empty-icon">⚠️</div>'+e.message+'</div></div>'});
}

// ---- Users ----
function renderUsers(c){var page=1,search='';
  var QPU=500000;
  function load(){
    c.innerHTML='<h1 class="page-title">用户管理</h1><div class="card"><span style="color:var(--muted)">加载中...</span></div>';
    api('/admin/users?page='+page+'&limit=30&search='+encodeURIComponent(search)).then(function(d){
      var rows=d.users.map(function(u){
        var role=u.is_admin?'<span class="badge badge-info">管理员</span>':'<span class="badge badge-success">用户</span>';
        var status=u.is_suspended?'<span class="badge badge-danger">已封禁</span>':'<span class="badge badge-success">正常</span>';
        var vipBadge=u.is_vip?'<span class="badge badge-warn" style="background:#fef3c7;color:#92400e">👑 VIP</span>':'<span class="badge" style="background:#f1f5f9;color:#94a3b8">—</span>';
        var typeBadge={free:'<span class="badge" style="background:#f1f5f9;color:#64748b">Free</span>',standard:'<span class="badge badge-success">Standard</span>',plus:'<span class="badge badge-info">Plus</span>',pro:'<span class="badge badge-warn" style="background:#fef3c7;color:#92400e">Pro</span>'}[u.membership_tier]||'<span class="badge">'+esc(u.membership_tier||'free')+'</span>';
        var typeSel='<select class="type-sel" data-uid="'+u.id+'" style="width:82px;font-size:11px;padding:3px 4px"><option value="free"'+(u.membership_tier==='free'?' selected':'')+'>Free</option><option value="standard"'+(u.membership_tier==='standard'?' selected':'')+'>Standard</option><option value="plus"'+(u.membership_tier==='plus'?' selected':'')+'>Plus</option><option value="pro"'+(u.membership_tier==='pro'?' selected':'')+'>Pro</option></select>';
        var scBadge=u.membership_tier==='plus'||u.membership_tier==='pro'?'<span style="font-size:11px;color:var(--success)">🔓 可自配</span>':'<span style="font-size:11px;color:var(--muted)">🔒 仅平台</span>';
        var balQuota=u.credit_balance||0;
        var balPoints=Math.round(balQuota/50000);
        var balUsd=(balPoints/10).toFixed(2);
        var act='';act+='<button class="btn btn-ghost copy-btn" data-uid="'+u.id+'" style="font-size:11px" title="复制用户ID">📋</button> ';
        if(!u.is_admin)act+='<button class="btn btn-ghost promote-btn" data-uid="'+u.id+'">⬆ 提权</button>';
        if(u.is_suspended){act+='<button class="btn btn-ghost unsuspend-btn" data-uid="'+u.id+'" style="color:var(--success)">✅ 解封</button>'}else{act+='<button class="btn btn-ghost suspend-btn" data-uid="'+u.id+'" style="color:var(--danger)">⛔ 封禁</button>'};if(u.has_new_api_key)act+=' <button class="btn btn-ghost rotate-key-btn" data-uid="'+u.id+'" data-email="'+esc(u.email)+'" style="font-size:11px" title="轮换NewAPI Key">🔄</button>';if(!u.is_admin)act+=' <button class="btn btn-ghost del-user-btn" data-uid="'+u.id+'" data-email="'+esc(u.email)+'" style="color:var(--danger);font-size:11px">🗑</button>';
        var newapiBadge=u.has_new_api_key?'<span class="badge badge-success" style="font-size:10px">🔑 已绑定</span><div style="font-size:10px;color:var(--muted)">ID: '+esc(String(u.new_api_user_id||'—'))+'</div>':'<span class="badge" style="background:#f1f5f9;color:#94a3b8;font-size:10px">—</span>';
        return'<tr><td><strong>'+esc(u.email)+'</strong><div style="font-size:10px;color:var(--muted)">'+esc(u.id).substring(0,8)+'...</div></td><td>'+esc(u.display_name||'—')+'</td><td>'+typeBadge+'<div style="margin-top:2px">'+typeSel+'</div></td><td>'+vipBadge+'</td><td>'+role+'</td><td>'+status+'</td><td>'+newapiBadge+'</td><td style="font-weight:600">$'+balUsd+'<div style="font-size:10px;color:var(--muted)">'+balPoints.toLocaleString()+' 积分</div></td><td>'+scBadge+'</td><td style="font-size:12px">'+fmtDate(u.created_at)+'</td><td>'+act+'</td></tr>';
      }).join('');
      var pager=d.total>30?'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px"><span style="color:var(--muted);font-size:13px">共 '+d.total+' 个用户</span><div style="display:flex;gap:8px">'+
        (page>1?'<button class="btn btn-outline btn-sm prev-btn">上一页</button>':'')+
        '<span style="font-size:13px;color:var(--muted);padding:5px 8px">'+page+' / '+Math.ceil(d.total/30)+'</span>'+
        (page*30<d.total?'<button class="btn btn-outline btn-sm next-btn">下一页</button>':'')+'</div></div>':'';
      c.innerHTML='<h1 class="page-title">用户管理</h1>'+
        '<div class="card" style="margin-bottom:16px"><input class="search-inp" placeholder="🔍 搜索邮箱或名称..." value="'+esc(search)+'" style="max-width:400px"></div>'+
        '<div class="card" style="overflow:auto"><table><thead><tr><th>邮箱</th><th>名称</th><th>订阅等级</th><th>VIP</th><th>角色</th><th>状态</th><th>NewAPI</th><th>余额</th><th>自配</th><th>注册时间</th><th>操作</th></tr></thead><tbody>'+rows+'</tbody></table>'+pager+'</div>';
      c.querySelector('.search-inp').addEventListener('input',function(e){search=e.target.value;page=1;load()});

// ---- Credits ----
function renderCredits(c){
  c.innerHTML='<h1 class="page-title">额度管理</h1><div class="card"><span style="color:var(--muted)">加载中...</span></div>';
  // 并行加载汇总、交易、请求日志、按模型统计
  Promise.all([
    api('/admin/credits/summary').catch(function(){return{}}),
    api('/admin/credits/transactions?limit=30').catch(function(){return{transactions:[]}}),
    api('/admin/credits/request-logs?limit=30').catch(function(){return{logs:[]}}),
    api('/admin/credits/usage-by-model?days=30').catch(function(){return[]}),
    api('/admin/users?limit=200').catch(function(){return{users:[]}}),
    api('/admin/credits/reset-preview').catch(function(){return{users:[]}})
  ]).then(function(r){var s=r[0],tx=r[1],rl=r[2],um=r[3],ud=r[4],rp=r[5];
    // 摘要卡片
    var cards='<div class="stat-grid" style="margin-bottom:20px">'+
      '<div class="stat-card"><div class="stat-icon">💰</div><div class="stat-val">'+Math.round((s.total_balance||0)/50000).toLocaleString()+'</div><div class="stat-lbl">总余额（积分）</div></div>'+
      '<div class="stat-card"><div class="stat-icon">📊</div><div class="stat-val">'+Math.round((s.total_consumed||0)/50000).toLocaleString()+'</div><div class="stat-lbl">累计消耗（积分）</div></div>'+
      '<div class="stat-card"><div class="stat-icon">📅</div><div class="stat-val">'+Math.round((s.consumed_this_month||0)/50000).toLocaleString()+'</div><div class="stat-lbl">本月消耗（积分）</div></div>'+
      '<div class="stat-card"><div class="stat-icon">👥</div><div class="stat-val">'+(s.users_with_credits||0)+'</div><div class="stat-lbl">额度用户</div></div></div>';

    // 充值（金额以美元计；后端 credits 以 quota 单位存，500000 quota = $1）
    var QPU=500000;
    var grant='<div class="card" style="max-width:600px;margin-bottom:20px"><div class="card-header"><h2>💳 手动充值</h2></div>'+
      '<div class="form-row form-row-3"><div><label>用户</label><select class="grant-uid" style="font-size:12px"><option value="">选择用户...</option>'+(ud.users||[]).map(function(u){var pts=Math.round((u.credit_balance||0)/50000);return'<option value="'+u.id+'">'+esc(u.email)+' — '+pts+'积分 ($'+(pts/10).toFixed(2)+') '+(u.display_name?esc(u.display_name):'')+'</option>'}).join('')+'</select></div>'+
      '<div><label>金额（$）</label><input class="grant-amt" type="number" min="0.01" step="0.01" placeholder="美元，如 5"></div>'+
      '<div><label>备注</label><input class="grant-desc" placeholder="充值说明"></div></div>'+
      '<div class="grant-msg" style="font-size:13px;margin-bottom:12px"></div>'+
      '<button class="btn btn-primary grant-btn">确认充值</button></div>';

    // 批量重置额度
    var resetUsers=rp.users||[];
    var resetRows=resetUsers.length?resetUsers.map(function(u){
      var typeLabel=u.membershipTier==='pro'?'Pro':u.membershipTier==='plus'?'Plus':u.membershipTier==='standard'?'Standard':'Free';
      return'<tr><td><input type="checkbox" class="reset-cb" data-uid="'+u.id+'" data-amount="'+u.resetAmountQuota+'" checked></td><td><strong>'+esc(u.email)+'</strong></td><td><span class="badge '+(u.membershipTier==='pro'?'badge-warn':u.membershipTier==='plus'?'badge-info':u.membershipTier==='standard'?'badge-success':'')+'">'+typeLabel+'</span></td><td class="number">$'+u.currentBalanceUSD+'</td><td class="number" style="color:var(--success);font-weight:600">→ $'+u.resetAmountUSD+' ('+Math.round(u.resetAmountQuota/50000).toLocaleString()+' 积分)</td></tr>';
    }).join(''):'<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">👥</div>暂无用户数据</div></td></tr>';
    var batchReset='<div class="card" style="margin-bottom:20px"><div class="card-header"><div><h2>🔄 批量重置额度</h2><div style="font-size:12px;color:var(--muted);margin-top:2px">Free $1 / Standard $5 / Plus $10 / Pro $15 · 重置后余额将设为对应类型的默认值</div></div>'+
      '<div style="display:flex;gap:8px"><button class="btn btn-outline btn-sm selall-btn">全选</button><button class="btn btn-outline btn-sm desel-btn">取消全选</button>'+
      '<button class="btn btn-danger btn-sm reset-btn" style="margin-left:8px">⚠ 重置选中用户额度</button></div></div>'+
      '<div style="overflow:auto"><table><thead><tr><th style="width:32px"><input type="checkbox" class="reset-all-cb" checked></th><th>邮箱</th><th>类型</th><th>当前余额</th><th>重置为</th></tr></thead><tbody>'+resetRows+'</tbody></table>'+
      '<div class="reset-msg" style="font-size:13px;margin-top:12px;text-align:right"></div></div></div>';

    // 按模型用量
    var modelRows=um.length?um.map(function(m){
      var maxCost=Math.max.apply(null,um.map(function(x){return x.total_cost}))||1;
      var bar=Math.round(m.total_cost/maxCost*100);
      return'<tr><td><strong>'+esc(m.model)+'</strong></td><td>'+m.requests+' 次</td><td>'+(m.total_tokens/1000).toFixed(1)+'K</td><td style="font-weight:600">'+m.total_cost.toLocaleString()+'</td><td><div style="height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;min-width:60px"><div style="height:100%;width:'+bar+'%;background:var(--primary);border-radius:3px"></div></div></td></tr>'}).join(''):'<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">📭</div>暂无用量数据</div></td></tr>';
    var modelTable='<div class="card" style="overflow:auto;margin-bottom:20px"><div class="card-header"><h2>📊 近30天用量（按模型）</h2></div><table><thead><tr><th>模型</th><th>请求数</th><th>Token量</th><th>费用</th><th>占比</th></tr></thead><tbody>'+modelRows+'</tbody></table></div>';

    // 请求日志
    var logRows=rl.logs&&rl.logs.length?rl.logs.map(function(l){
      return'<tr><td>'+esc(l.model)+'</td><td>'+(l.stream?'流式':'')+'</td><td>'+(l.total_tokens>0?(l.total_tokens/1000).toFixed(1)+'K':'—')+'</td><td style="color:var(--danger);font-weight:600">-'+l.cost_credits.toLocaleString()+'</td><td>'+(l.duration_ms?(l.duration_ms/1000).toFixed(1)+'s':'—')+'</td><td>'+fmtDateTime(l.created_at)+'</td></tr>'}).join(''):'<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📭</div>暂无请求记录</div></td></tr>';
    var logTable='<div class="card" style="overflow:auto;margin-bottom:20px"><div class="card-header"><h2>📋 最近请求日志</h2></div><table><thead><tr><th>模型</th><th>类型</th><th>Token</th><th>费用</th><th>耗时</th><th>时间</th></tr></thead><tbody>'+logRows+'</tbody></table></div>';

    // 交易记录
    var txRows=tx.transactions&&tx.transactions.length?tx.transactions.map(function(tx){return'<tr><td><strong>'+esc(tx.user_email||tx.user_id)+'</strong></td><td style="color:'+(tx.amount>=0?'var(--success)':'var(--danger)')+';font-weight:600">'+(tx.amount>=0?'+':'')+tx.amount.toLocaleString()+'</td><td><span class="badge '+(tx.type==='grant'?'badge-success':tx.type==='consumption'?'badge-warn':'badge-info')+'">'+tx.type+'</span></td><td>'+esc(tx.description||'-')+'</td><td>'+fmtDateTime(tx.created_at)+'</td></tr>'}).join(''):'<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">📭</div>暂无交易记录</div></td></tr>';
    var txTable='<div class="card" style="overflow:auto"><div class="card-header"><h2>📋 最近交易</h2></div><table><thead><tr><th>用户</th><th>数量</th><th>类型</th><th>说明</th><th>时间</th></tr></thead><tbody>'+txRows+'</tbody></table></div>';

    c.innerHTML='<h1 class="page-title">额度管理</h1>'+cards+grant+batchReset+modelTable+logTable+txTable;

    c.querySelector('.grant-btn').addEventListener('click',function(){
      var uid=c.querySelector('.grant-uid').value,amtUsd=parseFloat(c.querySelector('.grant-amt').value),desc=c.querySelector('.grant-desc').value;
      if(!uid||!(amtUsd>0)){toast('请选择用户和有效金额',false);return}
      var quota=Math.round(amtUsd*QPU);
      c.querySelector('.grant-msg').innerHTML='<span style="color:var(--muted)">处理中...</span>';
      api('/admin/credits/grant',{method:'POST',body:JSON.stringify({userId:uid,amount:quota,description:desc||('管理员充值 $'+amtUsd.toFixed(2))})}).then(function(r){toast('✅ 已充值 $'+amtUsd.toFixed(2));renderCredits(c)}).catch(function(e){c.querySelector('.grant-msg').innerHTML='<span style="color:#ef4444">'+e.message+'</span>'});
    });

    // ---- 批量重置额度事件 ----
    var resetAllCb=c.querySelector('.reset-all-cb');
    if(resetAllCb){
      resetAllCb.addEventListener('change',function(){
        c.querySelectorAll('.reset-cb').forEach(function(cb){cb.checked=resetAllCb.checked});
      });
    }
    c.querySelector('.selall-btn').addEventListener('click',function(){
      c.querySelectorAll('.reset-cb').forEach(function(cb){cb.checked=true});if(resetAllCb)resetAllCb.checked=true;
    });
    c.querySelector('.desel-btn').addEventListener('click',function(){
      c.querySelectorAll('.reset-cb').forEach(function(cb){cb.checked=false});if(resetAllCb)resetAllCb.checked=false;
    });
    c.querySelector('.reset-btn').addEventListener('click',function(){
      var checked=c.querySelectorAll('.reset-cb:checked');
      if(checked.length===0){toast('请至少选择一个用户',false);return}
      var ids=[];checked.forEach(function(cb){ids.push(cb.dataset.uid)});
      var sample=ids.slice(0,3).map(function(id){var u=resetUsers.find(function(x){return x.id===id});return u?u.email+'→$'+u.resetAmountUSD:id}).join(', ');
      if(!confirm('确定要重置 '+ids.length+' 个用户的额度吗？\n\n示例：'+sample+(ids.length>3?' ... 等共'+ids.length+'人':'')))return;
      c.querySelector('.reset-msg').innerHTML='<span style="color:var(--muted)">处理中...</span>';
      api('/admin/credits/batch-reset',{method:'POST',body:JSON.stringify({userIds:ids})}).then(function(r){
        toast('✅ 已重置 '+r.count+' 个用户额度');
        renderCredits(c);
      }).catch(function(e){
        c.querySelector('.reset-msg').innerHTML='<span style="color:#ef4444">'+e.message+'</span>';
      });
    });
    // 单个 checkbox 变化时同步全选框
    c.querySelectorAll('.reset-cb').forEach(function(cb){cb.addEventListener('change',function(){
      var all=c.querySelectorAll('.reset-cb');var checked=c.querySelectorAll('.reset-cb:checked');
      if(resetAllCb)resetAllCb.checked=checked.length===all.length;
    })});
  }).catch(function(e){c.innerHTML='<h1 class="page-title">额度管理</h1><div class="card"><div class="empty-state"><div class="empty-icon">⚠️</div>'+e.message+'</div></div>'});
}

var CYCLE_LABEL={monthly:'月付',yearly:'年付'};
function load(){
c.innerHTML='<h1 class="page-title">兑换码管理</h1><div class="card"><span style="color:var(--muted)">加载中...</span></div>';
api('/admin/redemption-codes').then(function(codes){
var rows=codes.length?codes.map(function(r){
var st=r.status==='active'?'<span class="badge badge-success">有效</span>':r.status==='used'?'<span class="badge badge-info">已使用</span>':'<span class="badge badge-warn">'+r.status+'</span>';
var typeLabel=TYPE_LABEL[r.type]||r.type;
var valueLabel=r.type==='credits'?r.value+' 积分':r.type==='plan'?r.value+' · '+(CYCLE_LABEL[r.cycle]||r.cycle):'VIP 终身';
var usedInfo=r.used_by?'<span style="font-size:11px">'+(r.used_by_email||r.used_by)+'</span>':'—';
return'<tr><td><code style="font-size:12px">'+esc(r.code)+'</code></td><td><span class="badge badge-info">'+typeLabel+'</span></td><td>'+esc(valueLabel)+'</td><td>'+st+'</td><td>'+usedInfo+'</td><td>'+(r.expires_at?fmtDate(r.expires_at):'不限')+'</td><td>'+fmtDate(r.created_at)+'</td></tr>';
}).join(''):'<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">🎁</div>暂无兑换码</div></td></tr>';
c.innerHTML='<h1 class="page-title">兑换码管理</h1>'+
'<div class="card" style="max-width:600px;margin-bottom:20px"><div class="card-header"><h2>🎁 生成兑换码</h2></div>'+
'<div class="form-row form-row-3"><div><label>类型</label><select class="rc-type">'+typeOpts+'</select></div>'+
'<div><label>兑换内容</label><div class="rc-value-wrap"><select class="rc-value-sel" style="display:none">'+planOpts+'</select><input class="rc-value-inp" type="text" placeholder="输入积分数"></div></div>'+
'<div><label>套餐周期</label><select class="rc-cycle" style="display:none"><option value="monthly">月付</option><option value="yearly">年付</option></select></div></div>'+
'<div class="form-row form-row-3"><div><label>数量</label><input class="rc-count" type="number" min="1" max="100" value="1"></div>'+
'<div><label>有效期(天)</label><input class="rc-days" type="number" min="0" value="0" placeholder="0=不限"></div>'+
'<div style="display:flex;align-items:flex-end"><button class="btn btn-primary gen-btn" style="width:100%">生成兑换码</button></div></div>'+
'<div class="rc-msg" style="font-size:13px;margin-bottom:12px;word-break:break-all"></div></div>'+
'<div class="card" style="overflow:auto"><div class="card-header"><h2>📋 已有兑换码</h2></div><table><thead><tr><th>兑换码</th><th>类型</th><th>内容</th><th>状态</th><th>使用者</th><th>有效期至</th><th>创建时间</th></tr></thead><tbody>'+rows+'</tbody></table></div>';

// 类型切换联动
var typeSel=c.querySelector('.rc-type');
var planSel=c.querySelector('.rc-value-sel');
var inp=c.querySelector('.rc-value-inp');
var cycleSel=c.querySelector('.rc-cycle');
function updateFields(){
var t=typeSel.value;
if(t==='credits'){planSel.style.display='none';inp.style.display='block';inp.placeholder='积分数量，如 100';cycleSel.style.display='none'}
else if(t==='plan'){planSel.style.display='block';inp.style.display='none';cycleSel.style.display='block'}
else if(t==='vip'){planSel.style.display='none';inp.style.display='none';cycleSel.style.display='none'}
}
typeSel.addEventListener('change',updateFields);
updateFields();

c.querySelector('.gen-btn').addEventListener('click',function(){
var cnt=parseInt(c.querySelector('.rc-count').value)||1;
var tp=typeSel.value;
var val=tp==='plan'?planSel.value:(tp==='vip'?'vip':c.querySelector('.rc-value-inp').value.trim());
var cycle=c.querySelector('.rc-cycle').value||'monthly';
var days=parseInt(c.querySelector('.rc-days').value)||0;
if(tp==='credits'&&(!val||isNaN(parseInt(val))||parseInt(val)<=0)){toast('请输入有效积分数',false);return}
var body={count:cnt,type:tp,value:val,expiresInDays:days||null};
if(tp==='plan')body.cycle=cycle;
c.querySelector('.rc-msg').innerHTML='<span style="color:var(--muted)">生成中...</span>';
api('/admin/redemption-codes',{method:'POST',body:JSON.stringify(body)}).then(function(r){
var list=r.codes.map(function(x){return'<code>'+esc(x.code)+'</code>'}).join(' ');
c.querySelector('.rc-msg').innerHTML='<span style="color:var(--success);font-weight:600">✅ 已生成 '+r.codes.length+' 个兑换码</span><div style="margin-top:8px;background:#f0fdf4;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.8">'+list+'</div>';
load();
}).catch(function(e){c.querySelector('.rc-msg').innerHTML='<span style="color:#ef4444">'+e.message+'</span>'});
});
}).catch(function(e){c.innerHTML='<h1 class="page-title">兑换码管理</h1><div class="card"><div class="empty-state"><div class="empty-icon">⚠️</div>'+e.message+'</div></div>'});
}
load();
}
// ---- Pricing Config ----
function renderPricing(c){
  c.innerHTML='<h1 class="page-title">定价配置</h1><div class="card"><span style="color:var(--muted)">加载中...</span></div>';
  api('/admin/config').then(function(d){
    var groups=d.groups||{};
    var groupOrder=['套餐定价','VIP','计费','安全限额','杂项'];
    var html='<h1 class="page-title">定价配置</h1>';

    html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">'+
      '<div style="font-size:13px;color:var(--muted)">修改即时生效，无需重启服务。</div>'+
      '<button class="btn btn-outline btn-sm reset-all-btn">重置全部为默认值</button></div>';

    groupOrder.forEach(function(gname){
      var items=groups[gname];
      if(!items||!items.length)return;
      html+='<div class="card" style="margin-bottom:16px"><div class="card-header"><h2>'+esc(gname)+'</h2></div>'+
        '<table><thead><tr><th style="width:200px">配置项</th><th>当前值</th><th style="width:100px">单位</th><th style="width:80px">默认值</th><th style="width:80px">操作</th></tr></thead><tbody>';

      items.forEach(function(item){
        var displayVal=item.value,displayDefault=item.defaultValue,unit='';
        if(item.type==='int'){
          if(item.key.indexOf('monthlyRmb')>=0||item.key.indexOf('yearlyRmb')>=0||item.key==='vip.price'){
            displayVal='¥'+(item.value/100).toFixed(0);displayDefault='¥'+(item.defaultValue/100).toFixed(0);unit='人民币分';
          }else if(item.key.indexOf('Rmb')<0){unit=item.key.indexOf('quota')>=0?'quota':''}
        }else if(item.type==='float'){displayVal=item.value.toFixed(2);displayDefault=item.defaultValue.toFixed(2)}
        var customized=item.isCustomized?'<span class="badge badge-warn" style="margin-left:4px;font-size:10px">自定义</span>':'';
        html+='<tr><td><strong>'+esc(item.label)+'</strong><div style="font-size:10px;color:var(--muted)">'+esc(item.key)+'</div></td>'+
          '<td style="font-weight:600;font-family:monospace">'+displayVal+customized+'</td>'+
          '<td style="font-size:11px;color:var(--muted)">'+esc(unit)+'</td>'+
          '<td style="font-family:monospace;font-size:12px;color:var(--muted)">'+displayDefault+'</td>'+
          '<td><button class="btn btn-ghost edit-cfg-btn" data-key="'+esc(item.key)+'" data-val="'+esc(String(item.rawValue))+
            '" data-type="'+esc(item.type)+'" data-label="'+esc(item.label)+'">编辑</button></td></tr>';
      });

      html+='</tbody></table></div>';
    });

    c.innerHTML=html;

    c.querySelectorAll('.edit-cfg-btn').forEach(function(b){
      b.addEventListener('click',function(){
        var key=b.dataset.key,curVal=b.dataset.val,type=b.dataset.type,label=b.dataset.label;
                var newVal=prompt('修改 '+label+' ('+key+'):\n当前值: '+curVal+'\n类型: '+type,curVal);
        if(newVal===null||newVal===curVal)return;
        if(newVal.trim()===''){
          if(!confirm('确定重置「'+label+'」为默认值？'))return;
          api('/admin/config/reset',{method:'POST',body:JSON.stringify({key:key})}).then(function(){toast('已重置');renderPricing(c)}).catch(function(e){toast(e.message,false)});
          return;
        }
        if(type==='int'&&isNaN(parseInt(newVal))){toast('请输入整数',false);return}
        if(type==='float'&&isNaN(parseFloat(newVal))){toast('请输入数字',false);return}
        api('/admin/config/'+encodeURIComponent(key),{method:'PUT',body:JSON.stringify({
          value:type==='int'?parseInt(newVal):type==='float'?parseFloat(newVal):String(newVal)
        })}).then(function(r){toast('已更新 '+label);renderPricing(c)}).catch(function(e){toast(e.message,false)});
      });
    });

    var resetBtn=c.querySelector('.reset-all-btn');
    if(resetBtn){
      resetBtn.addEventListener('click',function(){
        if(!confirm('确定将所有配置项重置为默认值？此操作不可撤销！'))return;
        api('/admin/config/reset',{method:'POST',body:JSON.stringify({})}).then(function(){toast('已全部重置');renderPricing(c)}).catch(function(e){toast(e.message,false)});
      });
    }
  }).catch(function(e){
    c.innerHTML='<h1 class="page-title">定价配置</h1><div class="card"><div class="empty-state"><div class="empty-icon">⚠️</div>'+e.message+'</div></div>';
  });
}



// ---- Orders ----
function renderOrders(c){
  var QPU=500000;
  var status='', allUsers=[], filteredUsers=[];

  // 先加载用户列表，再渲染表单
  api('/admin/users?limit=200').then(function(ud){
    allUsers=(ud.users||[]).sort(function(a,b){return (a.email||'').localeCompare(b.email||'')});
    filteredUsers=allUsers;

    c.innerHTML='<h1 class="page-title">📦 订单管理</h1>'+
      '<div class="card"><div class="card-header"><h2>创建充值订单</h2></div>'+
        '<div class="form-row form-row-3">'+
          '<div><label>用户（搜索选择）</label>'+
            '<input class="order-user-search" placeholder="🔍 输入邮箱或名称筛选…" style="margin-bottom:6px" autocomplete="off">'+
            '<select id="new-order-user" size="5" style="height:auto;font-size:12px"><option value="">— 请先筛选用户 —</option></select>'+
            '<div style="font-size:11px;color:var(--muted);margin-top:2px">已选：<span class="order-user-info">—</span></div></div>'+
          '<div><label>类型</label><select id="new-order-type"><option value="topup">💰 积分充值</option><option value="subscription">📋 套餐购买</option><option value="vip">👑 VIP 购买 (¥698)</option></select></div>'+
          '<div><label>金额（人民币，分）</label><input id="new-order-amount" type="number" placeholder="如 4900 = ¥49"></div>'+
        '</div>'+
        '<div class="form-row form-row-3" id="sub-fields" style="display:none">'+
          '<div><label>套餐</label><select id="new-order-plan"><option value="standard">标准版 (¥29/月)</option><option value="plus">Plus版 (¥49/月)</option><option value="pro">Pro版 (¥99/月)</option></select></div>'+
          '<div><label>周期</label><select id="new-order-cycle"><option value="monthly">月付</option><option value="yearly">年付</option></select></div>'+
          '<div><label>套餐金额自动计算</label><div id="sub-amount-preview" style="padding:9px 0;font-weight:600;color:var(--primary)">—</div></div>'+
        '</div>'+
        '<div class="form-row">'+
          '<div><label>备注</label><input id="new-order-remark" placeholder="可选备注"></div>'+
          '<div style="display:flex;align-items:end"><button class="btn btn-primary" id="create-order-btn">+ 创建订单</button></div>'+
        '</div>'+
      '</div>'+
      '<div class="card"><div class="card-header"><h2>订单列表</h2>'+
        '<div style="display:flex;gap:8px">'+
          '<button class="btn btn-outline btn-sm filter-btn on" data-status="">全部</button>'+
          '<button class="btn btn-outline btn-sm filter-btn" data-status="pending">待确认</button>'+
          '<button class="btn btn-outline btn-sm filter-btn" data-status="paid">已收款</button>'+
          '<button class="btn btn-outline btn-sm filter-btn" data-status="expired">已过期</button>'+
        '</div>'+
      '</div><div class="orders-table"></div></div>';

    // 填充用户下拉
    function populateUserSelect(filter){
      var list=filter?allUsers.filter(function(u){
        var q=filter.toLowerCase();
        return (u.email||'').toLowerCase().indexOf(q)!==-1 || (u.display_name||'').toLowerCase().indexOf(q)!==-1;
      }) : allUsers;
      filteredUsers=list;
      var sel=c.querySelector('#new-order-user');
      var html=list.length?list.map(function(u){
        var pts=Math.round((u.credit_balance||0)/50000);
        return '<option value="'+u.id+'">'+esc(u.email)+' — '+pts+'积分 ($'+(pts/10).toFixed(2)+') '+(u.display_name?esc(u.display_name):'')+'</option>';
      }).join(''):'<option value="">无匹配用户</option>';
      sel.innerHTML=html;
    }
    populateUserSelect('');

    // 用户搜索
    c.querySelector('.order-user-search').addEventListener('input',function(e){populateUserSelect(e.target.value)});
    c.querySelector('#new-order-user').addEventListener('change',function(){
      var uid=this.value;
      var u=filteredUsers.find(function(x){return x.id===uid});
      c.querySelector('.order-user-info').innerHTML=u?esc(u.email)+' · '+Math.round((u.credit_balance||0)/50000)+'积分 ($'+((u.credit_balance||0)/QPU).toFixed(2)+') · '+esc(u.display_name||'')+' <button class="btn btn-ghost copy-btn" data-uid="'+uid+'" style="font-size:10px">📋</button>':'—';
    });

    // 类型切换 → 显示/隐藏套餐字段、自动填 VIP 金额
    c.querySelector('#new-order-type').addEventListener('change',function(){
      var type=this.value;
      c.querySelector('#sub-fields').style.display=type==='subscription'?'grid':'none';
      if(type==='vip'){
        c.querySelector('#new-order-amount').value='69800';
      }else if(type==='subscription'){
        updateSubAmount();
      }else{
        c.querySelector('#new-order-amount').value='';
      }
    });

    // 套餐/周期变化 → 重新计算金额
    function updateSubAmount(){
      var plan=c.querySelector('#new-order-plan').value;
      var cycle=c.querySelector('#new-order-cycle').value;
      var PRICES={standard:{monthly:2900,yearly:29600},plus:{monthly:4900,yearly:50000},pro:{monthly:9900,yearly:101000}};
      var amt=(PRICES[plan]||{})[cycle]||0;
      var pts=Math.round(amt/10);c.querySelector('#sub-amount-preview').textContent='¥'+(amt/100).toFixed(2)+'（'+pts+' 积分）';
      c.querySelector('#new-order-amount').value=amt;
    }
    c.querySelector('#new-order-plan').addEventListener('change',updateSubAmount);
    c.querySelector('#new-order-cycle').addEventListener('change',updateSubAmount);

    // 创建订单
    c.querySelector('#create-order-btn').addEventListener('click',function(){
      var uid=c.querySelector('#new-order-user').value;
      var type=c.querySelector('#new-order-type').value;
      var amount=parseInt(c.querySelector('#new-order-amount').value,10);
      var remark=c.querySelector('#new-order-remark').value.trim();
      if(!uid){toast('请选择用户',false);return}
      if(!amount||amount<=0){toast('请填写有效金额',false);return}
      var body={userId:uid,type:type,amountRmb:amount,remark:remark};
      if(type==='subscription'){
        body.plan=c.querySelector('#new-order-plan').value;
        body.cycle=c.querySelector('#new-order-cycle').value;
      }
      api('/admin/orders',{method:'POST',body:JSON.stringify(body)})
        .then(function(r){toast('订单已创建，'+r.credits+' 积分');loadOrders()})
        .catch(function(e){toast(e.message,false)});
    });

    loadOrders();
  }).catch(function(e){c.innerHTML='<h1 class="page-title">📦 订单管理</h1><div class="card"><div class="empty-state"><div class="empty-icon">⚠️</div>'+e.message+'</div></div>'});

  function loadOrders(){
    api('/admin/orders?status='+status+'&limit=50').then(function(r){
      var rows=r.orders||[];
      if(!rows.length){c.querySelector('.orders-table').innerHTML='<div class="empty-state"><div class="empty-icon">📦</div>暂无订单</div>';return}
      var h='<table><thead><tr><th>用户</th><th>类型</th><th>金额</th><th>积分</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody>';
      var TYPE={topup:'💰 充值',vip:'👑 VIP',subscription:'📋 套餐'};
      var STATUS={pending:'<span class="badge badge-warn">待确认</span>',paid:'<span class="badge badge-success">已收款</span>',expired:'<span class="badge badge-info">已过期</span>'};
      var PLAN={standard:'标准版',plus:'Plus版',pro:'Pro版'};
      rows.forEach(function(o){
        var typeLabel=TYPE[o.type]||o.type;
        if(o.type==='subscription'&&o.plan) typeLabel+=' · '+(PLAN[o.plan]||o.plan)+' · '+(o.cycle==='yearly'?'年付':'月付');
        h+='<tr><td><div style="font-weight:500">'+esc(o.user_email||'?')+'</div><div style="font-size:11px;color:var(--muted)">'+(o.user_name?esc(o.user_name):'')+(o.user_id?' <button class="btn btn-ghost copy-btn" data-uid="'+o.user_id+'" style="font-size:9px;padding:1px 4px">📋</button>':'')+'</div></td>'+
          '<td>'+typeLabel+'</td>'+
          '<td>¥'+(o.amount_rmb/100).toFixed(2)+'</td>'+
          '<td>'+o.credits.toLocaleString()+' 积分</td>'+
          '<td>'+(STATUS[o.status]||o.status)+'</td>'+
          '<td style="font-size:12px;color:var(--muted)">'+fmtDateTime(o.created_at)+'</td>'+
          '<td>'+(o.status==='pending'?
            '<button class="btn btn-primary btn-sm confirm-btn" data-oid="'+o.id+'" data-amt="'+(o.amount_rmb/100).toFixed(2)+'">确认收款</button> '+
            '<button class="btn btn-outline btn-sm expire-btn" data-oid="'+o.id+'">过期</button>'
            :'')+'</td></tr>';
      });
      h+='</tbody></table>';
      c.querySelector('.orders-table').innerHTML=h;

      // confirm
      c.querySelectorAll('.confirm-btn').forEach(function(b){
        b.addEventListener('click',function(){
          if(!confirm('确认收到 ¥'+b.dataset.amt+' ？'))return;
          api('/admin/orders/'+b.dataset.oid+'/confirm',{method:'POST'}).then(function(){toast('已确认收款');loadOrders()}).catch(function(e){toast(e.message,false)});
        });
      });
      // expire
      c.querySelectorAll('.expire-btn').forEach(function(b){
        b.addEventListener('click',function(){
          if(!confirm('确定将此订单标记为过期？'))return;
          api('/admin/orders/'+b.dataset.oid+'/expire',{method:'POST'}).then(function(){toast('已标记过期');loadOrders()}).catch(function(e){toast(e.message,false)});
        });
      });
      // copy user ID buttons in orders table
      c.querySelectorAll('.copy-btn').forEach(function(b){
        b.addEventListener('click',function(e){e.stopPropagation();navigator.clipboard.writeText(b.dataset.uid).then(function(){toast('已复制用户ID')})});
      });
    }).catch(function(e){c.querySelector('.orders-table').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div>'+e.message+'</div>'});
  }

  loadOrders();

  c.querySelectorAll('.filter-btn').forEach(function(b){
    b.addEventListener('click',function(){
      status=b.dataset.status;
      c.querySelectorAll('.filter-btn').forEach(function(bb){bb.className='btn btn-outline btn-sm filter-btn'+(bb.dataset.status===status?' on':'')});
      loadOrders();
    });
  });
}

function esc(s){s=s||'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function formatTokens(n){n=Number(n||0);return n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'K':n.toLocaleString()}
function fmtDate(t){return new Date(t).toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'})}
function fmtDateTime(t){return new Date(t).toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}

init();
})();
