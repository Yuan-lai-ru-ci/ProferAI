name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-x64:
    name: build (windows-latest, win, x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # 固定到已在本地验证过的版本，避免 latest 改变 lockfile 或测试行为。
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install server test dependencies
        run: npm ci --no-audit --no-fund
        working-directory: server
      - name: Verify tag matches app version
        shell: pwsh
        run: |
          $tagVersion = $env:GITHUB_REF_NAME -replace '^v', ''
          $packageVersion = node -p "require('./apps/electron/package.json').version"
          if ($tagVersion -ne $packageVersion) {
            throw "Tag version v$tagVersion does not match apps/electron/package.json version $packageVersion"
          }
          "Releasing verified version: $packageVersion"

      - name: Typecheck workspace
        run: bun run typecheck

      - name: Run unit and regression tests
        run: bun test --timeout 30000

      - name: Run Node.js server reliability gate
        run: bun run server:test:node
      - name: Build GitHub app
        run: bun run electron:build:github
        working-directory: .

      # Pi runtime is external to the main-process bundle; copy its dependency closure into appDir before electron-builder.
      - name: Sync external Agent runtime dependencies
        run: bun run sync:runtime-deps
        working-directory: apps/electron
      - name: Package Windows release
        run: npx electron-builder --win --x64 --publish never
        working-directory: apps/electron

      - name: Smoke test unpacked Windows app
        shell: pwsh
        working-directory: apps/electron
        run: |
          $appPath = Join-Path $PWD "out/win-unpacked/Profer.exe"
          if (-not (Test-Path -LiteralPath $appPath)) {
            throw "Missing unpacked application: $appPath"
          }

          $process = Start-Process -FilePath $appPath -ArgumentList "--disable-gpu" -PassThru
          Start-Sleep -Seconds 12
          if ($process.HasExited) {
            if ($process.ExitCode -ne 0) {
              throw "Packaged application exited during smoke test with code $($process.ExitCode)"
            }
            throw "Packaged application exited before the smoke-test window completed"
          }

          # 长驻 Electron 进程存活至观察窗口即视为通过；清理时的强制终止退出码不代表启动失败。
          Stop-Process -Id $process.Id -Force
          $process.WaitForExit()

      - name: Probe packaged Pi runtime closure
        shell: pwsh
        working-directory: apps/electron
        run: |
          $probePath = Join-Path $PWD "scripts/packaged-pi-probe.cjs"
          if (-not (Test-Path -LiteralPath $probePath)) {
            throw "Missing Pi probe script: $probePath"
          }
          $unpackedResources = Join-Path $PWD "out/win-unpacked/resources"
          if (-not (Test-Path -LiteralPath $unpackedResources)) {
            throw "Missing unpacked resources for Pi probe: $unpackedResources"
          }
          $env:ELECTRON_RUN_AS_NODE = "1"
          $result = & "out/win-unpacked/Profer.exe" $probePath 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host $result
            throw "Pi runtime closure probe failed with exit code $LASTEXITCODE"
          }
          Write-Host "Pi runtime closure verified"

      - name: Collect Windows release assets
        shell: pwsh
        working-directory: apps/electron
        run: |
          $tag = $env:GITHUB_REF_NAME
          $version = $tag.TrimStart("v")
          $required = @(
            "latest.yml"
            "Profer-Setup-$version.exe"
            "Profer-Setup-$version.exe.blockmap"
          )

          New-Item -ItemType Directory -Force -Path "release-assets" | Out-Null
          foreach ($name in $required) {
            $source = Join-Path "out" $name
            if (-not (Test-Path -LiteralPath $source)) {
              Write-Host "Files in apps/electron/out:"
              Get-ChildItem -Path "out" -Recurse | Select-Object FullName, Length
              throw "Missing required Windows release asset: $name"
            }
            Copy-Item -LiteralPath $source -Destination "release-assets/$name" -Force
          }

      - name: Remove stale release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        working-directory: apps/electron
        run: |
          gh release delete "$env:GITHUB_REF_NAME" --repo "$env:GITHUB_REPOSITORY" --yes --cleanup-tag=false 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No existing release to delete for $env:GITHUB_REF_NAME"
          }

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Profer ${{ github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: |
            apps/electron/release-assets/latest.yml
            apps/electron/release-assets/*.exe
            apps/electron/release-assets/*.exe.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
