name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows-x64:
    name: build (windows-latest, win, x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build GitHub app
        run: bun run electron:build:github
        working-directory: .

      - name: Remove stale draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $tag = $env:GITHUB_REF_NAME
          $repo = $env:GITHUB_REPOSITORY
          $releases = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/$repo/releases?per_page=100"
          $drafts = @($releases | Where-Object { $_.tag_name -eq $tag -and $_.draft })
          foreach ($release in $drafts) {
            Write-Host "Deleting stale draft release $($release.id) for $tag"
            Invoke-RestMethod -Method Delete -Headers $headers -Uri "https://api.github.com/repos/$repo/releases/$($release.id)"
          }

      - name: Publish Windows release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish always
        working-directory: apps/electron

      - name: Publish release metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $tag = $env:GITHUB_REF_NAME
          $repo = $env:GITHUB_REPOSITORY
          $releases = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/$repo/releases?per_page=100"
          $release = $releases | Where-Object { $_.tag_name -eq $tag } | Select-Object -First 1
          if (-not $release) {
            throw "Release for $tag was not found after publishing"
          }
          $body = @{
            name = $tag
            draft = $false
            prerelease = $false
            make_latest = "true"
          } | ConvertTo-Json
          Invoke-RestMethod -Method Patch -Headers $headers -ContentType "application/json" -Uri "https://api.github.com/repos/$repo/releases/$($release.id)" -Body $body
